# TeleBos — Multi-Account Telegram Manager
# docker-compose.yml for full-stack deployment
#
# Semua env vars diambil dari root .env file (satu sumber, konsisten).
# Lihat .env.example untuk referensi semua variable yang dibutuhkan.

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file: ./.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: telebos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-redis-secret-in-production}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-redis-secret-in-production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telebos
      DATABASE_URL_SYNC: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telebos
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/2
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000"]}'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telebos
      DATABASE_URL_SYNC: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telebos
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  telegram-bot:
    build: ./backend
    command: python -m app.bot.main
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telebos
      DATABASE_URL_SYNC: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telebos
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-change-redis-secret-in-production}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    env_file: ./.env
    environment:
      API_PROXY_TARGET: http://backend:8000
      DATABASE_URL_SYNC: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telebos
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_WS_URL: ws://backend:8000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
